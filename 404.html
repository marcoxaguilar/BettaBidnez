<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Lora:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background: #FBF7F0;
            color: #3D3229;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 24px;
        }
        .error-code {
            font-family: 'Lora', serif;
            font-size: clamp(4rem, 12vw, 8rem);
            font-weight: 700;
            background: linear-gradient(135deg, #5BC0EB, #3AA5D4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1;
            margin-bottom: 12px;
        }
        h1 {
            font-family: 'Lora', serif;
            font-size: 1.6rem;
            margin-bottom: 12px;
            color: #3D3229;
        }
        p {
            font-size: 1rem;
            color: #6B5F51;
            max-width: 420px;
            line-height: 1.7;
            margin-bottom: 28px;
        }
        .btns { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
        .btn {
            padding: 14px 28px;
            border-radius: 24px;
            font-size: 0.92rem;
            font-weight: 700;
            font-family: 'Nunito', sans-serif;
            text-decoration: none;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-primary {
            background: linear-gradient(135deg, #F0A830, #ED7B4F);
            color: #fff;
            box-shadow: 0 4px 16px rgba(240,168,48,0.3);
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(240,168,48,0.4); }
        .btn-outline {
            background: transparent;
            color: #5C4F3D;
            border: 2px solid #C8C1B4;
        }
        .btn-outline:hover { border-color: #5BC0EB; color: #3AA5D4; }
    </style>
</head>
<body>
    <div class="error-code">404</div>

    <div class="btns">
